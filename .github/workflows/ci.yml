name: CI

on:
  push:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.3
        with:
          environments: dev

      - name: Run tests
        env:
          NVE_API_KEY: ${{ secrets.NVE_API_KEY }}
        run: pixi run -e dev test
