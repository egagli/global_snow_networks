name: Daily Station Update

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.3

      - name: Create station geojson
        run: pixi run fetch-stations

      - name: Refresh station CSV data and archive
        continue-on-error: true
        run: pixi run fetch-data

      - name: Build live map
        continue-on-error: true
        run: pixi run live-map

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for f in \
            all_daily_snow_stations.geojson \
            live_swe_map.html \
            .nojekyll \
            clients/awdb/awdb_stations.geojson \
            clients/cdec/cdec_stations.geojson \
            clients/databc/databc_stations.geojson \
            charts \
            data; do
            [ -e "$f" ] && git add "$f" || true
          done
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: daily station + map refresh"
          git push
