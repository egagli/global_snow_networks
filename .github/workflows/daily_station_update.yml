name: Daily Station Update

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.3

      - name: Install environment
        run: pixi install

      - name: Create station geojson
        run: pixi run fetch-stations

      - name: Refresh station CSV data and archive
        run: pixi run fetch-data

      - name: Build live map
        run: pixi run live-map

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snow_stations.geojson live_swe_map.html charts/ data/ .nojekyll
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: daily station + map refresh"
          git push
