name: Build and Deploy Map

on:
  push:
    branches: [main]
  workflow_call:

# Allow one concurrent deployment; don't cancel in-progress deploys.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Explicit ref: when called from the daily workflow, the default
      # checkout would use the *trigger* commit, which predates the
      # geojson/data commits that same run just pushed — the map would
      # always be built from stale data.
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: prefix-dev/setup-pixi@v0.8.3

      - uses: actions/configure-pages@v5

      - name: Build live map
        run: pixi run live-map

      - name: Stage Pages artifact
        run: |
          mkdir -p _site
          cp live_swe_map.html _site/index.html
          touch _site/.nojekyll
          [ -d charts ] && cp -r charts _site/charts || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
