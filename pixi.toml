[workspace]
name = "global-snow-point-obs"
version = "0.1.0"
description = "Archive and access tools for global snow point observations (SWE, snow depth) from AWDB and other sources."
authors = ["your-name <your@email.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.12"
ipykernel = "*"
numpy = ">=1.26"
pandas = ">=2.2"
geopandas = ">=1.0"
shapely = ">=2.0"
requests = ">=2.31"
lxml = ">=5.0"
tqdm = ">=4.66"
fsspec = ">=2026.3.0,<2027"
aiohttp = ">=3.13.4,<4"
beautifulsoup4 = ">=4.14.3,<5"
playwright = ">=1.58.2,<2"

[feature.dev.dependencies]
jupyter = "*"
matplotlib = ">=3.8"
pytest = ">=8.0"
ruff = ">=0.4"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[tasks]
fetch-stations   = "python -m scripts.create_all_stations_geojson"
fetch-data       = "python -m scripts.get_all_stations_data"
fetch-data-awdb  = "python -m scripts.get_all_stations_data --network awdb"
fetch-data-cdec  = "python -m scripts.get_all_stations_data --network cdec"
fetch-data-databc = "python -m scripts.get_all_stations_data --network databc"
fetch-data-nve   = "python -m scripts.get_all_stations_data --network nve"
finalize-data    = "python -m scripts.get_all_stations_data --finalize-only"
live-map         = "python -m scripts.generate_live_map"
update-all       = { depends-on = ["fetch-stations", "fetch-data", "live-map"] }
test             = "pytest tests/ -v"
test-awdb        = "pytest tests/test_awdb_client.py -v"
test-cdec        = "pytest tests/test_cdec_client.py -v"
test-databc      = "pytest tests/test_databc_client.py -v"
test-nve         = "pytest tests/test_nve_client.py -v"

[pypi-dependencies]
playwright = ">=1.58.0, <2"
